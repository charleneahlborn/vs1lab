<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header">
        <div class="row">
            <div class="col-4"> 
                <img src="./images/location.png" class="header__image" alt="an image of a map and location">
            </div>
            <div class="col-4">
                <h1 class="header__title">GeoTagApp</h1>
            </div>
            <div class="col-4">
                <nav class="header__navigation">
                <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="row">
            <div class="col-3">
                 <section class="main__tagging tagging">
                
                <h2>Tagging</h2>

                <!-- ############### VS1Lab 1a Form 1 Start -->
                <form id="tag-form" action="/tagging" method="post">
                    <fieldset>
                        <legend>Add a new GeoTag</legend>
                        <label for="latitude">Latitude</label><br>
                        <input type="text" id="ipt_latitude" name="latitude" value="52.5200" readonly><br>

                        <label for="longitude">Longitude</label><br>
                        <input type="text" id="ipt_longitude" name="longitude" value="13.4050" readonly><br>

                        <label for="name">Name</label><br>
                        <input type="text" id="ipt_name" name="name" placeholder="Castle" required maxlength="10"><br>

                        <label for="hashtag">Hashtag</label><br>
                        <input type="text" id="ipt_hashtag" name="hashtag" placeholder="#sight" maxlength="11" pattern="#.{0,10}"><br> 
                        
                        <input type="submit" value="Add Tag">
                    </fieldset>
                </form>
                <!-- ############### VS1Lab 1a Form 1 End -->

            </section>
            </div>
           
            <div class="col-9">
                <section class="main__discovery discovery">
                <h2 class="discovery__title">Discovery</h2>

                <!-- ############### VS1Lab 1a Form 2 Start -->
                <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">
                    <fieldset>
                        <legend>Search GeoTags</legend>
                        <label for="inp_searchterm">Search by keywords:</label><br>
                        <input type="text" id="ipt_searchterm" name="searchterm" placeholder="view"><br>

                        <input type="hidden" id="hidden_latitude" name="latitude">
                        <input type="hidden" id="hidden_longitude" name="longitude">


                        <input type="submit" value="Search">
                    </fieldset>
                    

                </form>
                <!-- ############### VS1Lab 1a Form 2 End -->
                <div class="row">
                <div class="discovery__wrapper">
                    <div class="col-6">
                        <div class="discovery__taglist">
                        <ul class="discovery__results" id="discoveryResults">
                            <li>Castle (49.01379, 8.404435) #sight</li>
                            <li>IWI (49.01379, 8.390071) #edu</li>
                        </ul>
                        </div>
                    </div>
                    
                    <div class="col-6">
                        <div id="map" class="discovery__map">
                        <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                        <span>Result map</span>
                    </div>
                    </div>
                </div>

                </div>
                
            </section>
            </div>
            
        </div>

    </main>
    <footer class="footer">
        <div class="row"> 
            
         
            <span>(c) 2021/22 HKA_IWI_VSYS</span>

            
        </div>
    </footer>
        
    
</body>

</html>
